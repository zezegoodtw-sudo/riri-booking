<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>日日居 後台管理</title>
<style>
:root {
  --moss:#3d5a3e; --moss-light:#e8f0e8; --moss-mid:#6b8f6c;
  --warm:#c4703a; --warm-light:#faf0e8;
  --myzoo:#c4703a; --myzoo-light:#faf0e8;
  --ink:#1a1714; --ink2:#4a4540; --ink3:#8a8480;
  --paper:#faf8f4; --paper2:#f2efe9; --paper3:#e8e4dc;
  --danger:#c0392b; --danger-light:#fdf0ee;
  --confirmed:#0F6E56; --pending:#BA7517; --cancelled:#993C1D;
  --replied:#2255cc;
  --border:rgba(26,23,20,0.12); --radius:12px; --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:var(--paper2);color:var(--ink);font-size:14px;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-card{background:var(--paper);border-radius:var(--radius);padding:40px 32px;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo-main{font-size:28px;font-weight:300;letter-spacing:0.2em;}
.login-logo-sub{font-size:11px;color:var(--ink3);letter-spacing:0.15em;margin-top:4px;}
.login-label{font-size:12px;color:var(--ink2);margin-bottom:6px;display:block;}
.login-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--paper);font-size:14px;outline:none;}
.login-input:focus{border-color:var(--moss);}
.login-btn{width:100%;margin-top:16px;padding:14px;background:var(--moss);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;cursor:pointer;}
.login-btn:hover{background:#2e4530;}

/* TOPBAR */
.topbar{background:var(--moss);padding:0 20px;height:52px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.topbar-logo{font-size:16px;color:#fff;font-weight:400;letter-spacing:0.1em;}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.topbar-btn{background:rgba(255,255,255,0.15);color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;}
.topbar-btn:hover{background:rgba(255,255,255,0.25);}

/* TABS */
.tabs{display:flex;background:var(--paper);border-bottom:1px solid var(--border);}
.tab{padding:12px 20px;font-size:13px;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;}
.tab.active{color:var(--moss);border-bottom-color:var(--moss);font-weight:500;}

/* MAIN */
.main{max-width:1100px;margin:0 auto;padding:20px;}

/* SUMMARY */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin-bottom:20px;}
.summary-card{background:var(--paper);border-radius:var(--radius-sm);padding:16px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.06);cursor:pointer;transition:background 0.15s;}
.summary-card:hover{background:var(--paper2);}
.summary-card.active{outline:2px solid var(--moss);}
.summary-num{font-size:26px;font-weight:500;margin-bottom:4px;}
.summary-label{font-size:11px;color:var(--ink3);}

/* CAL CONTROLS */
.cal-controls{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.cal-nav-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--paper);cursor:pointer;font-size:16px;color:var(--ink2);display:flex;align-items:center;justify-content:center;}
.cal-nav-btn:hover{background:var(--paper2);}
.cal-month-label{font-size:22px;font-weight:500;color:var(--ink);min-width:120px;text-align:center;}
.loc-toggle{display:flex;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;}
.loc-btn{padding:7px 16px;font-size:13px;border:none;cursor:pointer;background:var(--paper);color:var(--ink3);}
.loc-btn.active{background:var(--moss);color:#fff;}
.loc-btn.active.myzoo{background:var(--myzoo);}

/* CALENDAR GRID */
.cal-wrap{background:var(--paper);border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);background:var(--paper2);border-bottom:1px solid var(--border);}
.cal-dow span{text-align:center;padding:12px 0;font-size:15px;color:var(--ink3);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-cell{min-height:180px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:6px 8px;position:relative;cursor:pointer;transition:background 0.12s;}
.cal-cell:nth-child(7n){border-right:none;}
.cal-cell:hover{background:var(--paper2);}
.cal-cell.empty{cursor:default;background:var(--paper2);opacity:0.5;}
.cal-cell.past{cursor:default;}
.cal-cell.past .cell-day{color:var(--ink3);}
.cal-cell.today{background:#fff9f0;}
.cell-day{font-size:18px;font-weight:500;color:var(--ink);margin-bottom:8px;}
.cell-day.today-num{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;background:var(--moss);color:#fff;border-radius:50%;font-size:16px;}
.cell-day.sun{color:#c0392b;}
.cell-day.sat{color:#2255cc;}
.cell-badge{display:inline-block;font-size:13px;padding:3px 8px;border-radius:8px;margin-left:4px;font-weight:500;}
.badge-full{background:#fdf0ee;color:var(--cancelled);}
.badge-partial{background:var(--moss-light);color:var(--confirmed);}
.badge-closed{background:#f0f0f0;color:var(--ink3);}
.badge-holiday{background:#fff0e0;color:var(--warm);}
.booking-chip{font-size:14px;padding:4px 10px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.chip-pending{background:#fff3dc;color:var(--pending);}
.chip-confirmed{background:var(--moss-light);color:var(--confirmed);}
.chip-replied{background:#e8f0ff;color:var(--replied);}
.chip-cancelled{background:var(--danger-light);color:var(--cancelled);}
.chip-released{background:#f0f0f0;color:var(--ink3);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
.modal-overlay.show{display:flex;}
.modal{background:var(--paper);border-radius:var(--radius);padding:28px;width:100%;max-width:480px;margin:auto;}
.modal-title{font-size:16px;font-weight:500;margin-bottom:6px;}
.modal-subtitle{font-size:12px;color:var(--ink3);margin-bottom:20px;}
.modal-section{margin-bottom:20px;}
.modal-section-title{font-size:12px;color:var(--ink3);font-weight:500;margin-bottom:10px;letter-spacing:0.05em;}

/* SLOT TOGGLES */
.slot-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
.slot-toggle{padding:10px 4px;text-align:center;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;cursor:pointer;background:var(--paper);color:var(--ink3);transition:all 0.15s;}
.slot-toggle.on{border-color:var(--moss);background:var(--moss-light);color:var(--moss);font-weight:500;}
.slot-toggle.on.myzoo{border-color:var(--myzoo);background:var(--myzoo-light);color:var(--myzoo);}
.slot-toggle.booked{color:var(--ink3);text-decoration:line-through;cursor:not-allowed;opacity:0.45;background:var(--paper2);}
.mode-btns{display:flex;gap:8px;margin-bottom:12px;}
.mode-btn{flex:1;padding:8px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;cursor:pointer;background:var(--paper);color:var(--ink2);}
.mode-btn.active{border-color:var(--moss);background:var(--moss-light);color:var(--moss);font-weight:500;}
.mode-btn.active.full{border-color:var(--danger);background:var(--danger-light);color:var(--danger);}
.mode-btn.active.closed{border-color:var(--ink3);background:#f0f0f0;color:var(--ink3);}

/* BOOKING ROW IN MODAL */
.booking-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--paper2);border-radius:var(--radius-sm);margin-bottom:6px;}
.booking-row-time{font-size:12px;color:var(--ink3);width:42px;flex-shrink:0;}
.booking-row-name{font-size:13px;font-weight:500;flex:1;}
.booking-row-status{font-size:11px;}
.booking-row-actions{display:flex;gap:4px;}
.row-btn{padding:3px 8px;border:none;border-radius:5px;font-size:11px;cursor:pointer;}
.row-btn.confirm{background:var(--moss-light);color:var(--moss);}
.row-btn.cancel{background:var(--danger-light);color:var(--danger);}
.row-btn.reschedule{background:#e8f0ff;color:var(--replied);}

/* RESCHEDULE SECTION */
.reschedule-wrap{background:var(--paper2);border-radius:var(--radius-sm);padding:14px;margin-top:12px;}
.reschedule-title{font-size:12px;font-weight:500;color:var(--ink);margin-bottom:10px;}
.reschedule-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.rs-label{font-size:11px;color:var(--ink3);margin-bottom:4px;}
.rs-input,.rs-select{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--paper);font-size:13px;outline:none;}
.rs-input:focus,.rs-select:focus{border-color:var(--moss);}

/* MODAL FOOTER */
.modal-footer{display:flex;gap:10px;margin-top:20px;}
.modal-btn{flex:1;padding:12px;border:none;border-radius:var(--radius-sm);font-size:14px;cursor:pointer;}
.modal-btn.primary{background:var(--moss);color:#fff;}
.modal-btn.primary:hover{background:#2e4530;}
.modal-btn.secondary{background:var(--paper2);color:var(--ink2);}
.modal-btn.danger{background:var(--danger-light);color:var(--danger);}

/* BOOKINGS LIST TAB */
.filter-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.filter-label{font-size:12px;color:var(--ink3);}
.filter-select{padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--paper);font-size:13px;outline:none;}
.booking-table{width:100%;border-collapse:collapse;background:var(--paper);border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.booking-table th{background:var(--moss);color:#fff;padding:10px 14px;font-size:12px;font-weight:500;text-align:left;}
.booking-table td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;}
.booking-table tr:last-child td{border-bottom:none;}
.booking-table tr:hover td{background:var(--paper2);}
.status-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;}
.status-待確認{background:#fff8e6;color:var(--pending);}
.status-已確認{background:var(--moss-light);color:var(--confirmed);}
.status-已取消{background:var(--danger-light);color:var(--cancelled);}
.status-已釋放{background:#f0f0f0;color:var(--ink3);}
.action-btn{padding:4px 10px;border:none;border-radius:6px;font-size:12px;cursor:pointer;margin:2px;}
.action-btn.confirm{background:var(--moss-light);color:var(--moss);}
.action-btn.cancel{background:var(--danger-light);color:var(--danger);}
.action-btn.reschedule{background:#e8f0ff;color:var(--replied);}

/* SCHEDULE TAB */
.rule-card{background:var(--paper);border-radius:var(--radius-sm);padding:16px;margin-bottom:16px;font-size:13px;color:var(--ink2);line-height:1.8;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.rule-card strong{color:var(--moss);}
.schedule-wrap{background:var(--paper);border-radius:var(--radius);padding:20px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.schedule-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.schedule-title{font-size:15px;font-weight:500;}
.schedule-add-btn{background:var(--moss);color:#fff;border:none;padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;}
.schedule-table{width:100%;border-collapse:collapse;}
.schedule-table th{font-size:12px;color:var(--ink3);padding:8px 10px;border-bottom:1px solid var(--border);text-align:left;}
.schedule-table td{padding:8px 10px;border-bottom:1px solid var(--border);font-size:13px;}
.schedule-input{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--paper);outline:none;}
.schedule-input:focus{border-color:var(--moss);}
.del-btn{background:none;border:none;color:var(--ink3);cursor:pointer;font-size:16px;padding:2px 6px;}
.del-btn:hover{color:var(--danger);}
.save-bar{margin-top:16px;display:flex;gap:10px;align-items:center;}
.save-btn{background:var(--moss);color:#fff;border:none;padding:10px 24px;border-radius:var(--radius-sm);font-size:14px;cursor:pointer;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1714;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.toast.success{background:var(--moss);}
.toast.error{background:var(--danger);}

.empty-state{text-align:center;padding:40px;color:var(--ink3);font-size:13px;}
.today-bar-card{background:var(--paper);border-radius:var(--radius-sm);padding:14px 18px;box-shadow:0 1px 4px rgba(0,0,0,0.06);flex:1;min-width:200px;}
.today-bar-title{font-size:11px;color:var(--ink3);margin-bottom:6px;font-weight:500;letter-spacing:0.05em;}
.today-bar-num{font-size:22px;font-weight:600;color:var(--ink);margin-bottom:4px;}
.today-bar-detail{font-size:12px;color:var(--ink3);}
.today-bar-detail span{margin-right:10px;}
.today-bar-detail .ms{color:var(--moss);}
.today-bar-detail .mz{color:var(--myzoo);}
hr.divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-main">日日居</div>
      <div class="login-logo-sub">後台管理系統</div>
    </div>
    <label class="login-label">管理密碼</label>
    <input class="login-input" type="password" id="pw-input" placeholder="請輸入密碼">
    <button class="login-btn" onclick="doLogin()">登入</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <div class="topbar">
    <div class="topbar-logo">日日居 後台</div>
    <div class="topbar-right">
      <button class="topbar-btn" onclick="loadAll()">⟳ 重新整理</button>
      <button class="topbar-btn" onclick="logout()">登出</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" id="tab-cal" onclick="switchTab('cal')">日曆管理</div>
    <div class="tab" id="tab-list" onclick="switchTab('list')">預約列表</div>
  </div>

  <!-- CAL TAB -->
  <div class="main" id="page-cal">
    <div class="summary-grid" id="summary-cards"></div>
    <!-- 今明日摘要列 -->
    <div id="today-bar" style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;"></div>
    <div class="cal-controls">
      <button class="cal-nav-btn" onclick="changeCalMonth(-1)">‹</button>
      <div class="cal-month-label" id="cal-month-label"></div>
      <button class="cal-nav-btn" onclick="changeCalMonth(1)">›</button>
      <div class="loc-toggle">
        <button class="loc-btn active" id="loc-btn-minsheng" onclick="switchLoc('minsheng')">民生</button>
        <button class="loc-btn" id="loc-btn-myzoo" onclick="switchLoc('myzoo')">MYZOO</button>
      </div>
    </div>
    <div class="cal-wrap">
      <div class="cal-dow">
        <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <!-- LIST TAB -->
  <div class="main" id="page-list" style="display:none;">
    <div class="filter-bar">
      <span class="filter-label">月份</span>
      <select class="filter-select" id="filter-ym" onchange="applyFilter()"></select>
      <span class="filter-label">狀態</span>
      <select class="filter-select" id="filter-status" onchange="applyFilter()">
        <option value="">全部</option>
        <option value="待確認">待確認</option>
        <option value="已確認">已確認</option>
        <option value="已取消">已取消</option>
        <option value="已釋放">已釋放</option>
      </select>
      <span class="filter-label">地點</span>
      <select class="filter-select" id="filter-loc" onchange="applyFilter()">
        <option value="">全部</option>
        <option value="民生">民生體驗點</option>
        <option value="MYZOO">MYZOO</option>
      </select>
    </div>
    <div id="list-container"></div>
  </div>

  <!-- SCHEDULE TAB (整合進日曆 modal) -->
  <div class="main" id="page-schedule" style="display:none !important;">
    <div class="rule-card">
      <strong>預設開放規則</strong>（不需填寫）<br>
      · 民生體驗點：每週六、日 13:00–17:00<br>
      · MYZOO：每週一~五 10:00–16:00（國定假日不開放）<br><br>
      <strong>手動覆蓋</strong>：填入日期可覆蓋預設規則<br>
      · 時段欄填 <code>13,14,17</code> → 只開放這些時段<br>
      · 填 <code>已滿</code> 或 <code>休息</code> → 不可預約
    </div>
    <div class="schedule-wrap">
      <div class="schedule-header">
        <div class="schedule-title">手動時段設定</div>
        <button class="schedule-add-btn" onclick="addScheduleRow()">+ 新增</button>
      </div>
      <table class="schedule-table">
        <thead><tr>
          <th>日期（yyyy/MM/dd）</th><th>體驗地點</th><th>時段（逗號分隔）或 已滿 / 休息</th><th>備註</th><th></th>
        </tr></thead>
        <tbody id="schedule-tbody"></tbody>
      </table>
      <div class="save-bar">
        <button class="save-btn" onclick="saveSchedule()">儲存設定</button>
        <span id="save-status" style="font-size:12px;color:var(--ink3);"></span>
      </div>
    </div>
  </div>
</div>

<!-- DAY MODAL -->
<div class="modal-overlay" id="day-modal">
  <div class="modal">
    <div class="modal-title" id="modal-date-title"></div>
    <div class="modal-subtitle" id="modal-date-subtitle"></div>
    <div id="modal-bookings-section"></div>
    <hr class="divider">
    <div class="modal-section">
      <div class="modal-section-title">時段狀態設定</div>
      <div class="mode-btns">
        <button class="mode-btn active" id="mode-open" onclick="setMode('open')">開放</button>
        <button class="mode-btn" id="mode-full" onclick="setMode('full')">已額滿</button>
        <button class="mode-btn" id="mode-closed" onclick="setMode('closed')">休息</button>
      </div>
      <div class="slot-grid" id="modal-slots"></div>
    </div>
    <div class="modal-footer">
      <button class="modal-btn primary" onclick="saveDaySchedule()">儲存</button>
      <button class="modal-btn secondary" onclick="closeModal()">關閉</button>
    </div>
  </div>
</div>

<!-- RESCHEDULE MODAL -->
<div class="modal-overlay" id="rs-modal">
  <div class="modal">
    <div class="modal-title">更改預約時間</div>
    <div class="modal-subtitle" id="rs-modal-subtitle"></div>
    <div class="modal-section">
      <div class="reschedule-row">
        <div>
          <div class="rs-label">新日期</div>
          <input class="rs-input" type="date" id="rs-date">
        </div>
        <div>
          <div class="rs-label">新時間</div>
          <select class="rs-select" id="rs-time">
            <option value="10">10:00</option><option value="11">11:00</option>
            <option value="12">12:00</option><option value="13">13:00</option>
            <option value="14">14:00</option><option value="15">15:00</option>
            <option value="16">16:00</option><option value="17">17:00</option>
          </select>
        </div>
      </div>
      <div style="font-size:12px;color:var(--ink3);line-height:1.7;background:var(--warm-light);padding:10px 12px;border-radius:var(--radius-sm);">
        更改後將自動寄送「時間更改通知信」給客人，並重置提醒發送記錄。
      </div>
    </div>
    <div class="modal-footer">
      <button class="modal-btn primary" onclick="confirmReschedule()">確認更改</button>
      <button class="modal-btn secondary" onclick="closeRsModal()">取消</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwYrbfhEzZoQtpxcoyaGUqdPrLflKeqC2lHYdkh66MXSFV6Iq56WYR9EreT2qoRz_tEbw/exec';
const ADMIN_PW = 'riri2026';

const TW_HOLIDAYS = {

// ── LOGIN ────────────────────────────────────────────────
function doLogin() {
  if (document.getElementById('pw-input').value === ADMIN_PW) {
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadAll();
  } else { showToast('密碼錯誤','error'); }
}

  document.getElementById('app').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('pw-input').value = '';
}
document.addEventListener('keydown', e => { if (e.key==='Enter' && document.getElementById('login-page').style.display!=='none') doLogin(); });

// ── TABS ─────────────────────────────────────────────────
function switchTab(t) {
  ['cal','list'].forEach(id => {
    document.getElementById('page-'+id).style.display = t===id ? '' : 'none';
    document.getElementById('tab-'+id).className = 'tab'+(t===id?' active':'');
  });
  if (t==='list') renderList();
}

// ── LOAD ─────────────────────────────────────────────────
async function loadAll() {
  const now = new Date();
  const ym  = now.getFullYear() + '/' + String(now.getMonth()+1).padStart(2,'0');
  try {
    const r = await fetch(API_URL + '?action=getBookings&ym=' + encodeURIComponent(ym));
    const d = await r.json();
    if (d.success) {
      bookings = (d.bookings||[]).map(b => ({
        ...b,
        time: parseTimeStr(b.time)
      }));
      renderSummary();
      renderTodayBar();
      renderCal();
      initMonthFilter();
    }
  } catch(e) { showToast('載入失敗','error'); }
}

function parseTimeStr(t) {
  if (!t) return '';
  const s = String(t);
  const d = new Date(s);
  if (!isNaN(d.getTime()) && s.length > 5) return String(d.getHours()).padStart(2,'0') + ':00';
  if (s.includes(':')) return s.split(':')[0].padStart(2,'0') + ':00';
  const h = parseInt(s);
  return isNaN(h) ? s : String(h).padStart(2,'0') + ':00';
}

function parseTimeHour(t) {
  const s = parseTimeStr(t);
  return s.split(':')[0].padStart(2,'0') + ':00';
}

// ── SUMMARY ──────────────────────────────────────────────

  const fmt = y => y.getFullYear() + '/' + String(y.getMonth()+1).padStart(2,'0') + '/' + String(y.getDate()).padStart(2,'0');
  const todayStr = fmt(now);
  const tomorrow = new Date(now); tomorrow.setDate(tomorrow.getDate()+1);
  const tomorrowStr = fmt(tomorrow);

  const activeStatus = ['待確認','已確認'];
  const todayAll  = bookings.filter(b => b.date === todayStr && activeStatus.includes(b.status));
  const todayMS   = todayAll.filter(b => b.location.includes('民生'));
  const todayMZ   = todayAll.filter(b => b.location.includes('MYZOO'));
  const tmrAll    = bookings.filter(b => b.date === tomorrowStr && activeStatus.includes(b.status));
  const tmrMS     = tmrAll.filter(b => b.location.includes('民生'));
  const tmrMZ     = tmrAll.filter(b => b.location.includes('MYZOO'));

  const todayDow   = ['日','一','二','三','四','五','六'][now.getDay()];
  const tmrDow     = ['日','一','二','三','四','五','六'][tomorrow.getDay()];

  document.getElementById('today-bar').innerHTML = `
    <div class="today-bar-card" style="border-left:4px solid var(--moss);">
      <div class="today-bar-title">今日（${todayStr.slice(5)} 星期${todayDow}）</div>
      <div class="today-bar-num">${todayAll.length} <span style="font-size:14px;font-weight:400;color:var(--ink3);">組</span></div>
      <div class="today-bar-detail">
        <span class="ms">民生 ${todayMS.length} 組</span>
        <span class="mz">MYZOO ${todayMZ.length} 組</span>
      </div>
    </div>
    <div class="today-bar-card" style="border-left:4px solid var(--warm);">
      <div class="today-bar-title">明日（${tomorrowStr.slice(5)} 星期${tmrDow}）</div>
      <div class="today-bar-num">${tmrAll.length} <span style="font-size:14px;font-weight:400;color:var(--ink3);">組</span></div>
      <div class="today-bar-detail">
        <span class="ms">民生 ${tmrMS.length} 組</span>
        <span class="mz">MYZOO ${tmrMZ.length} 組</span>

}

function renderSummary() {
  const ym = calYear + '/' + String(calMonth+1).padStart(2,'0');
  const inYm = bookings.filter(b => b.date && b.date.startsWith(ym));
  const cards = [
    { num: inYm.length,                                                   label:'本月總計',   color:'var(--ink)' },
    { num: inYm.filter(b=>b.status==='已確認').length,                    label:'已確認',     color:'var(--confirmed)' },
    { num: inYm.filter(b=>b.status==='待確認').length,                    label:'待確認',     color:'var(--pending)' },
    { num: inYm.filter(b=>b.status==='已取消'||b.status==='已釋放').length,label:'取消/釋放', color:'var(--cancelled)' },
    { num: inYm.filter(b=>b.location.includes('民生')).length,            label:'民生',       color:'var(--moss)' },
    { num: inYm.filter(b=>b.location.includes('MYZOO')).length,           label:'MYZOO',      color:'var(--myzoo)' },
  ];
  document.getElementById('summary-cards').innerHTML = cards.map(c =>
    `<div class="summary-card"><div class="summary-num" style="color:${c.color}">${c.num}</div><div class="summary-label">${c.label}</div></div>`
  ).join('');
}

// ── CALENDAR ─────────────────────────────────────────────
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const DAYS_ZH = ['日','一','二','三','四','五','六'];

function changeCalMonth(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderSummary();
  renderCal();
  // 重新載入該月資料
  const ym = calYear + '/' + String(calMonth+1).padStart(2,'0');
  fetch(API_URL + '?action=getBookings&ym=' + encodeURIComponent(ym))
    .then(r=>r.json()).then(d=>{
      if (d.success) {
        const parsed = (d.bookings||[]).map(b=>({...b, time:parseTimeStr(b.time)}));
        // merge: remove same month, add new
        bookings = bookings.filter(b=>!b.date.startsWith(ym)).concat(parsed);
        renderSummary(); renderCal();
      }
    }).catch(()=>{});
}

function switchLoc(loc) {
  curLoc = loc;
  document.getElementById('loc-btn-minsheng').className = 'loc-btn'+(loc==='minsheng'?' active':'');
  document.getElementById('loc-btn-myzoo').className = 'loc-btn myzoo'+(loc==='myzoo'?' active':'');
  renderCal();
}

function renderCal() {
  document.getElementById('cal-month-label').textContent = calYear + '年 ' + MONTHS[calMonth];
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  const today = new Date(); today.setHours(0,0,0,0);
  const first = new Date(calYear, calMonth, 1).getDay();
  const total = new Date(calYear, calMonth+1, 0).getDate();
  const ym    = calYear + '/' + String(calMonth+1).padStart(2,'0');
  const locName = curLoc === 'minsheng' ? '民生體驗點' : 'MYZOO';

  // 空格
  for (let i = 0; i < first; i++) {
    const d = document.createElement('div');
    d.className = 'cal-cell empty'; grid.appendChild(d);
  }

  for (let day = 1; day <= total; day++) {
    const cell   = document.createElement('div');
    const date   = new Date(calYear, calMonth, day);
    const isPast = date < today;
    const isToday= date.getTime() === today.getTime();
    const dow    = date.getDay();
    const dateStr= calYear + '/' + String(calMonth+1).padStart(2,'0') + '/' + String(day).padStart(2,'0');
    const dayBookings = bookings.filter(b => {
      const bd = b.date ? b.date.replace(/\./g,'/') : '';
      return bd === dateStr && b.location.includes(locName.includes('民生')?'民生':'MYZOO');
    });

    // 時段狀態
    const override = scheduleRows.find(r => {
      let rd = r.date; if(rd instanceof Date) rd = rd.toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'/');
      return rd === dateStr && r.location === locName;
    });
    const isHoliday = TW_HOLIDAYS[dateStr];
    const holidayName = HOLIDAY_NAMES[dateStr] || '';
    let dayStatus = 'normal';
    if (override) {
      const s = String(override.slots||'').trim().toLowerCase();
      if (s==='已滿'||s==='full') dayStatus='full';
      else if (s==='休息'||s==='closed') dayStatus='closed';
      else if (s) dayStatus='open';
    } else if (curLoc==='myzoo' && isHoliday) {
      dayStatus='closed';
    } else if (!DEFAULT_OPEN_DAYS[curLoc].includes(dow)) {
      dayStatus='closed';
    }

    // 從已有預約判斷
    const activeBookings = dayBookings.filter(b=>['待確認','已確認'].includes(b.status));
    if (dayStatus==='normal' && activeBookings.length >= DEFAULT_SLOTS[curLoc].length) dayStatus='full';
    else if (dayStatus==='normal' && activeBookings.length > 0) dayStatus='partial';

    cell.className = 'cal-cell' + (isPast?' past':'') + (isToday?' today':'');
    if (!isPast) cell.onclick = () => openDayModal(dateStr, dayBookings);

    // 日期數字
    const dayNum = document.createElement('div');
    dayNum.className = 'cell-day' + (dow===0?' sun':dow===6?' sat':'') + (isToday?' today-num':'');
    dayNum.innerHTML = day;
    // badge
    if (!isPast) {
      let badgeHtml = '';
      if (isHoliday && holidayName) badgeHtml = `<span class="cell-badge badge-holiday">${holidayName}</span>`;
      else if (dayStatus==='full')    badgeHtml = `<span class="cell-badge badge-full">額滿</span>`;
      else if (dayStatus==='closed')  badgeHtml = `<span class="cell-badge badge-closed">休息</span>`;
      else if (dayStatus==='partial') badgeHtml = `<span class="cell-badge badge-partial">部分</span>`;
      dayNum.innerHTML = day + badgeHtml;
    }
    cell.appendChild(dayNum);

    // booking chips
    dayBookings.slice(0,3).forEach(b => {
      const chip = document.createElement('div');
      const chipCls = {待確認:'chip-pending',已確認:'chip-confirmed',已取消:'chip-cancelled',已釋放:'chip-released'}[b.status]||'chip-pending';
      const replyLabel = b.status==='已回覆出席' ? ' ✓出席' : '';
      chip.className = 'booking-chip ' + chipCls;
      chip.textContent = parseTimeHour(b.time) + ' ' + b.name + replyLabel;
      cell.appendChild(chip);
    });
    if (dayBookings.length > 3) {
      const more = document.createElement('div');
      more.style.cssText = 'font-size:10px;color:var(--ink3);';
      more.textContent = '+' + (dayBookings.length-3) + ' 筆';
      cell.appendChild(more);
    }
    grid.appendChild(cell);
  }
}

// ── DAY MODAL ────────────────────────────────────────────
function openDayModal(dateStr, dayBookings) {
  modalDateStr = dateStr;
  const parts = dateStr.split('/');
  const d = new Date(parts[0], parts[1]-1, parts[2]);
  const dow = DAYS_ZH[d.getDay()];
  document.getElementById('modal-date-title').textContent = dateStr + '（星期' + dow + '）';
  document.getElementById('modal-date-subtitle').textContent = curLoc === 'minsheng' ? '民生體驗點' : 'MYZOO';

  // 預約列表
  const bookingSec = document.getElementById('modal-bookings-section');
  if (dayBookings.length > 0) {
    const bookedHours = new Set(
      dayBookings.filter(b=>['待確認','已確認'].includes(b.status)).map(b=>parseInt(parseTimeHour(b.time)))
    );
    bookingSec.innerHTML = `<div class="modal-section">
      <div class="modal-section-title">當日預約（${dayBookings.length} 筆）</div>
      ${dayBookings.map(b => buildBookingRow(b)).join('')}
    </div>`;
  } else {
    bookingSec.innerHTML = '';
  }

  // 時段設定
  const override = scheduleRows.find(r => {
    let rd = String(r.date||'');
    return rd === dateStr && r.location === (curLoc==='minsheng'?'民生體驗點':'MYZOO');
  });
  modalMode = 'open';
  modalSelectedSlots = new Set(DEFAULT_SLOTS[curLoc]);
  if (override) {
    const s = String(override.slots||'').trim().toLowerCase();
    if (s==='已滿') { modalMode='full'; }
    else if (s==='休息') { modalMode='closed'; }
    else if (s) { modalSelectedSlots = new Set(s.split(',').map(h=>parseInt(h.trim())).filter(h=>!isNaN(h))); }
  }
  setMode(modalMode);
  renderModalSlots(dayBookings);
  document.getElementById('day-modal').className = 'modal-overlay show';
}

function buildBookingRow(b) {
  const canConfirm = b.status==='待確認';
  const canCancel  = ['待確認','已確認'].includes(b.status);
  const statusColor = {待確認:'var(--pending)',已確認:'var(--confirmed)',已取消:'var(--cancelled)',已釋放:'var(--ink3)'}[b.status]||'';
  return `<div class="booking-row">
    <div class="booking-row-time">${parseTimeHour(b.time)}</div>
    <div class="booking-row-name">${b.name} <span style="font-size:11px;color:var(--ink3);">· ${b.pax}人</span></div>
    <div class="booking-row-status" style="color:${statusColor}">${b.status}</div>
    <div class="booking-row-actions">
      ${canConfirm?`<button class="row-btn confirm" onclick="quickAction('${b.bookingId}','已確認')">確認</button>`:''}
      ${canCancel?`<button class="row-btn cancel" onclick="quickAction('${b.bookingId}','已取消')">取消</button>`:''}
      <button class="row-btn reschedule" onclick="openRsModal('${b.bookingId}','${b.name}','${b.date}','${parseTimeHour(b.time)}')">改時間</button>
    </div>
  </div>`;
}

function setMode(mode) {
  modalMode = mode;
  ['open','full','closed'].forEach(m => {
    const btn = document.getElementById('mode-'+m);
    btn.className = 'mode-btn' + (m===mode?' active'+' '+m:'');
  });
  document.getElementById('modal-slots').style.opacity = mode==='open' ? '1' : '0.4';
}

function renderModalSlots(dayBookings) {
  const bookedHours = new Set(
    (dayBookings||[]).filter(b=>['待確認','已確認'].includes(b.status)).map(b=>parseInt(parseTimeHour(b.time)))
  );
  const isMyzoo = curLoc==='myzoo';
  document.getElementById('modal-slots').innerHTML = DEFAULT_SLOTS[curLoc].map(h => {
    const isBooked = bookedHours.has(h);
    const isOn = modalSelectedSlots.has(h) && modalMode==='open' && !isBooked;
    if (isBooked) return `<button class="slot-toggle booked" disabled>${String(h).padStart(2,'0')}:00<br><span style="font-size:9px;">已預約</span></button>`;
    return `<button class="slot-toggle${isOn?' on':''}${isMyzoo?' myzoo':''}" onclick="toggleSlot(${h})">${String(h).padStart(2,'0')}:00</button>`;
  }).join('');
}

function toggleSlot(h) {
  if (modalMode !== 'open') return;
  if (modalSelectedSlots.has(h)) modalSelectedSlots.delete(h);
  else modalSelectedSlots.add(h);
  const btn = document.querySelector(`#modal-slots .slot-toggle[onclick="toggleSlot(${h})"]`);
  if (btn) btn.className = `slot-toggle${modalSelectedSlots.has(h)?' on':''}${curLoc==='myzoo'?' myzoo':''}`;
}

async function saveDaySchedule() {
  const locName = curLoc==='minsheng' ? '民生體驗點' : 'MYZOO';
  let slots = '';
  if (modalMode==='full') slots='已滿';
  else if (modalMode==='closed') slots='休息';
  else slots = [...modalSelectedSlots].sort((a,b)=>a-b).join(',');

  // 更新 scheduleRows
  const idx = scheduleRows.findIndex(r => String(r.date)===modalDateStr && r.location===locName);
  if (idx>=0) { scheduleRows[idx].slots = slots; }
  else { scheduleRows.push({ date: modalDateStr, location: locName, slots, note:'' }); }

  // 存回 API
  try {
    const r = await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'saveSchedule', rows:scheduleRows }) });
    const d = await r.json();
    if (d.success) { showToast('已儲存','success'); renderCal(); closeModal(); }
    else showToast('儲存失敗','error');
  } catch(e) { showToast('網路錯誤','error'); }
}

function closeModal() { document.getElementById('day-modal').className='modal-overlay'; }

// ── RESCHEDULE MODAL ─────────────────────────────────────
function openRsModal(bookingId, name, date, time) {
  rsBookingId = bookingId;
  document.getElementById('rs-modal-subtitle').textContent = name + '・' + date + ' ' + time;
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
  document.getElementById('rs-date').value = tomorrow.toISOString().split('T')[0];
  document.getElementById('rs-time').value = '13';
  closeModal();
  document.getElementById('rs-modal').className='modal-overlay show';
}

function closeRsModal() { document.getElementById('rs-modal').className='modal-overlay'; rsBookingId=null; }

async function confirmReschedule() {
  if (!rsBookingId) return;
  const rawDate = document.getElementById('rs-date').value;
  const newTime = document.getElementById('rs-time').value;
  if (!rawDate) { showToast('請選擇日期','error'); return; }
  const newDate = rawDate.replace(/-/g,'/');
  try {
    const r = await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'updateBookingDateTime', bookingId:rsBookingId, newDate, newTime }) });
    const d = await r.json();
    if (d.success) { showToast('時間已更改，通知信已寄出','success'); closeRsModal(); await loadAll(); }
    else showToast(d.error||'更改失敗','error');
  } catch(e) { showToast('網路錯誤','error'); }
}

// ── QUICK ACTION ─────────────────────────────────────────
async function quickAction(bookingId, status) {
  try {
    await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'adminUpdateStatus', bookingId, status }) });
    showToast(status==='已確認'?'已確認！確認信將自動寄出':'已取消','success');
    closeModal();
    await loadAll();
  } catch(e) { showToast('操作失敗','error'); }
}

// ── LIST ─────────────────────────────────────────────────
function initMonthFilter() {
  const sel = document.getElementById('filter-ym');
  const cur = sel.value;
  const now = new Date();
  const thisYm = now.getFullYear() + '/' + String(now.getMonth()+1).padStart(2,'0');
  const yms = [...new Set(bookings.map(b=>b.date?b.date.substring(0,7):'').filter(Boolean))].sort().reverse();
  if (!yms.includes(thisYm)) yms.unshift(thisYm);
  sel.innerHTML = yms.map(ym=>`<option value="${ym}" ${ym===(cur||thisYm)?'selected':''}>${ym}</option>`).join('');
}

function applyFilter() { renderList(); }

function renderList() {
  const ym = document.getElementById('filter-ym').value;
  const st = document.getElementById('filter-status').value;
  const lo = document.getElementById('filter-loc').value;
  const filtered = bookings.filter(b => {
    if (ym && b.date && !b.date.startsWith(ym)) return false;
    if (st && b.status!==st) return false;
    if (lo && !b.location.includes(lo)) return false;
    return true;
  }).sort((a,b)=>(a.date+a.time)>(b.date+b.time)?1:-1);

  if (!filtered.length) { document.getElementById('list-container').innerHTML='<div class="empty-state">無符合資料</div>'; return; }
  document.getElementById('list-container').innerHTML = `
  <table class="booking-table">
    <thead><tr><th>日期/時間</th><th>地點</th><th>姓名</th><th>人數</th><th>商品</th><th>狀態</th><th>操作</th></tr></thead>
    <tbody>${filtered.map(b=>{
      const canConfirm = b.status==='待確認';
      const canCancel  = ['待確認','已確認'].includes(b.status);
      return `<tr>
        <td>${b.date}<br><span style="color:var(--ink3);font-size:12px;">${b.time}</span></td>
        <td>${b.location}</td>
        <td>${b.name}</td>
        <td>${b.pax}</td>
        <td style="font-size:12px;">${b.product}</td>
        <td><span class="status-badge status-${b.status}">${b.status}</span></td>
        <td>
          ${canConfirm?`<button class="action-btn confirm" onclick="quickAction('${b.bookingId}','已確認')">確認</button>`:''}
          ${canCancel?`<button class="action-btn cancel" onclick="quickAction('${b.bookingId}','已取消')">取消</button>`:''}
          <button class="action-btn reschedule" onclick="openRsModal('${b.bookingId}','${b.name}','${b.date}','${b.time}')">改時間</button>
        </td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

// ── SCHEDULE ─────────────────────────────────────────────
async function loadSchedule() {
  try {
    const r = await fetch(API_URL + '?action=getSchedule');
    const d = await r.json();
    if (d.success) { scheduleRows = d.rows||[]; renderScheduleTable(); }
  } catch(e) { showToast('時段載入失敗','error'); }
}

function renderScheduleTable() {
  const tbody = document.getElementById('schedule-tbody');
  tbody.innerHTML = scheduleRows.map((r,i) => `
  <tr>
    <td><input class="schedule-input" type="text" value="${r.date||''}" placeholder="2026/06/28" onchange="updateScheduleRow(${i},'date',this.value)"></td>
    <td><select class="schedule-input" onchange="updateScheduleRow(${i},'location',this.value)">
      <option value="民生體驗點" ${r.location==='民生體驗點'?'selected':''}>民生體驗點</option>
      <option value="MYZOO" ${r.location==='MYZOO'?'selected':''}>MYZOO</option>
    </select></td>
    <td><input class="schedule-input" type="text" value="${r.slots||''}" placeholder="13,14,17 或 已滿 或 休息" onchange="updateScheduleRow(${i},'slots',this.value)"></td>
    <td><input class="schedule-input" type="text" value="${r.note||''}" placeholder="備註" onchange="updateScheduleRow(${i},'note',this.value)"></td>
    <td><button class="del-btn" onclick="deleteScheduleRow(${i})">×</button></td>
  </tr>`).join('');
}

function updateScheduleRow(i,col,val) { scheduleRows[i][col]=val; }

function addScheduleRow() {
  const t=new Date(); t.setDate(t.getDate()+1);
  scheduleRows.push({ date:t.getFullYear()+'/'+String(t.getMonth()+1).padStart(2,'0')+'/'+String(t.getDate()).padStart(2,'0'), location:'民生體驗點', slots:'', note:'' });
  renderScheduleTable();
}

function deleteScheduleRow(i) { scheduleRows.splice(i,1); renderScheduleTable(); }

async function saveSchedule() {
  const btn = document.querySelector('.save-btn');
  btn.textContent='儲存中...'; btn.disabled=true;
  try {
    const r = await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'saveSchedule', rows:scheduleRows }) });
    const d = await r.json();
    if (d.success) {
      showToast('已儲存','success');
      document.getElementById('save-status').textContent='最後儲存：'+new Date().toLocaleTimeString('zh-TW');
      renderCal();
    } else showToast('儲存失敗','error');
  } catch(e) { showToast('網路錯誤','error'); }
  btn.textContent='儲存設定'; btn.disabled=false;
}

// ── TOAST ─────────────────────────────────────────────────
let toastTimer;
function showToast(msg,type='') {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast '+type+' show';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2800);
}

// 初始載入時段設定
window.addEventListener('load', ()=>{ loadSchedule().catch(()=>{}); });
</script>
